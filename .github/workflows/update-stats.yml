name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *' # Berjalan otomatis setiap hari jam 00:00 UTC
  workflow_dispatch: {} # Memungkinkan tombol run manual di tab Actions
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      metadata: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Pakai token bawaan aksi, atau ${{ secrets.GH_PAT }} jika ingin pakai PAT Anda
        run: python update_stats.py

      - name: Commit and push changes if any
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update real GitHub stats & badges"
          file_pattern: stats.json README.md