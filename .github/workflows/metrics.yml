name: Metrics
on:
  schedule: [{cron: "0 * * * *"}] # update setiap jam
  workflow_dispatch: # bisa dijalankan manual

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bangjc
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Jakarta

          # Plugin untuk issues
          plugin_issues: yes
          plugin_issues_author: yes   # tampilkan issue yang Anda buat
          plugin_issues_limit: 100    # jumlah issue yang ditampilkan
